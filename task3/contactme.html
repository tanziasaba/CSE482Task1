<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        
        .form-card {
            animation: slideRight 0.8s ease-out;
        }

        @keyframes slideRight {
            from { transform: translateX(40px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        
        .info-card {
            animation: slideLeft 0.8s ease-out;
        }

        @keyframes slideLeft {
            from { transform: translateX(-40px); opacity: 0; }
            to   { transform: translateX(0);     opacity: 1; }
        }

        .card {
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .nav-link:hover {
            color: #acf0e3 !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Portfolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="aboutme.html">About Me</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="projdone.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contactme.html">Contact Me</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h1>Contact Me</h1>

        <!-- two column layout using css grid -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">

            <!-- left side: contact info -->
            <div class="info-card">
                <img src="/contacts.png" alt="This is me" class="img-fluid mb-3 rounded">

                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">My Contact Details</h5>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex align-items-center gap-2">
                                📞 <span>0123456789</span>
                            </li>
                            <li class="list-group-item d-flex align-items-center gap-2">
                                📧 <span>kazi.saba@northsouth.edu</span>
                            </li>
                            <li class="list-group-item d-flex align-items-center gap-2">
                                🐙 <span>tanziasaba/github.com</span>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="alert alert-info mt-3">
                    I usually reply within 1-2 days!
                </div>
            </div>

            <div class="form-card card">
                <div class="card-body">
                    <h5 class="card-title">Send me a message</h5>

                    <div class="mb-3">
                        <label for="name" class="form-label">Your Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter your name">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject</label>
                        <select class="form-select" id="subject">
                            <option selected disabled>Choose a subject...</option>
                            <option>Project Collaboration</option>
                            <option>Graphic Design</option>
                            <option>Web Development</option>
                            <option>General Enquiry</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Write your message here"></textarea>
                    </div>

                   
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary" onclick="alert('Message sent!')">Submit</button>
                        <button type="button" class="btn btn-secondary"
                            onclick="document.getElementById('name').value='';
                                     document.getElementById('email').value='';
                                     document.getElementById('message').value='';
                                     document.getElementById('subject').selectedIndex=0;">
                            Clear
                        </button>
                    </div>

                </div>
            </div>

        </div>

        <br>
        <a href="index.html" class="btn btn-secondary">Back to Home</a>

    </div>

    <footer class="bg-dark text-white text-center p-3 mt-4">
        <p class="mb-0">© 2025 Kazi Tanzia Saba</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
