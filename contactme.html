            <div class="collapse navbar-collapse" id="navbarNav">

                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h1>Contact Me</h1>

        <img src="/contacts.png" alt="This is me" class="img-fluid mb-3">

        <ul class="list-group mb-4">
            <li class="list-group-item">📞 Phone Number: 0123456789</li>
            <li class="list-group-item">📧 Email: kazi.saba@northsouth.edu</li>
            <li class="list-group-item">🐙 Github: tanziasaba/github.com</li>
        </ul>

        <h4>Send me a message</h4>

        <div class="card mb-4">
            <div class="card-body">
                <div class="mb-3">
                    <label for="name" class="form-label">Your Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your name">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" rows="4" placeholder="Write your message here"></textarea>
                </div>
                <button type="button" class="btn btn-primary" onclick="alert('Message sent!')">Submit</button>
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('name').value=''; document.getElementById('email').value=''; document.getElementById('message').value=''">Clear</button>
            </div>
        </div>

        <a href="index.html" class="btn btn-secondary">Back to Home</a>

    </div>
